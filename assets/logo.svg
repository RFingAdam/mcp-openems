<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240"
     role="img" aria-label="mcp-openems — 3D FDTD electromagnetic simulation">
  <title>mcp-openems — 3D FDTD electromagnetic simulation</title>

  <defs>
    <linearGradient id="l-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="l-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="240" height="240" rx="44" ry="44"
        fill="url(#l-bg)" stroke="#1E293B" stroke-width="1"/>
  <rect x="12" y="12" width="216" height="216" rx="34" ry="34"
        fill="none" stroke="#1E293B" stroke-width="1" opacity="0.7"/>

  <!-- FDTD grid + propagating wavefront glyph -->
  <g transform="translate(40, 40)" filter="url(#l-glow)">
    <g stroke="#1E293B" stroke-width="0.8" opacity="0.8">
      <line x1="0"   y1="40"  x2="160" y2="40"/>
      <line x1="0"   y1="80"  x2="160" y2="80"/>
      <line x1="0"   y1="120" x2="160" y2="120"/>
      <line x1="40"  y1="0"   x2="40"  y2="160"/>
      <line x1="80"  y1="0"   x2="80"  y2="160"/>
      <line x1="120" y1="0"   x2="120" y2="160"/>
    </g>

    <g fill="none" stroke="#22D3EE" stroke-width="2.4"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M 0 80 Q 24 32, 48 80 T 96 80 T 144 80" stroke-opacity="1"/>
      <path d="M 0 80 Q 24 128, 48 80 T 96 80 T 144 80" stroke-opacity="0.5"/>
    </g>

    <g fill="#22D3EE">
      <circle cx="40"  cy="80" r="3"/>
      <circle cx="80"  cy="80" r="3"/>
      <circle cx="120" cy="80" r="3"/>
    </g>
  </g>
</svg>
